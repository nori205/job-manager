<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>仕事管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="仕事管理">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======== メインアプリ ======== -->
<div id="screen-app" class="screen app-layout">

  <!-- ヘッダー -->
  <header class="app-header">
    <span class="app-header-title">仕事管理</span>
    <div class="header-right">
      <span id="sync-dot" class="sync-dot" title="保存状態"></span>
      <div class="menu-wrap" id="menu-wrap">
        <button class="btn-icon light" id="btn-menu" aria-label="メニュー">⋮</button>
        <div class="export-menu hidden" id="export-menu">
          <button class="menu-item" id="btn-export-json">JSONで保存（バックアップ）</button>
          <button class="menu-item" id="btn-export-csv">CSVで保存（Excel用）</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 合計サマリー -->
  <div class="summary-bar">
    <div class="summary-item received-bg">
      <span class="summary-label">受注合計</span>
      <span class="summary-amount" id="total-received">¥0</span>
      <span class="summary-count" id="count-received">0件</span>
    </div>
    <div class="summary-item ordered-bg">
      <span class="summary-label">発注合計</span>
      <span class="summary-amount" id="total-ordered">¥0</span>
      <span class="summary-count" id="count-ordered">0件</span>
    </div>
  </div>

  <!-- タブ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="received">受注</button>
    <button class="tab-btn" data-tab="ordered">発注</button>
  </nav>

  <!-- リスト -->
  <main class="list-area">
    <div id="tab-received" class="tab-panel active">
      <div id="list-received" class="job-list">
        <div class="empty-state" id="empty-received">
          <div class="empty-icon">📋</div>
          <p>受注データがありません</p>
          <p class="empty-hint">＋ で追加できます</p>
        </div>
      </div>
    </div>
    <div id="tab-ordered" class="tab-panel">
      <div id="list-ordered" class="job-list">
        <div class="empty-state" id="empty-ordered">
          <div class="empty-icon">📦</div>
          <p>発注データがありません</p>
          <p class="empty-hint">＋ で追加できます</p>
        </div>
      </div>
    </div>
  </main>

  <!-- FAB -->
  <button class="fab" id="btn-add" aria-label="追加">＋</button>
</div>

<!-- ======== 追加・編集モーダル ======== -->
<div id="modal-job" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-sheet">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">追加</h2>
      <button class="btn-icon" id="btn-modal-close" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <form id="job-form" novalidate>
        <input type="hidden" id="field-id">
        <input type="hidden" id="field-type">

        <div class="form-section">基本情報</div>

        <div class="form-row">
          <label class="field-label" for="field-order-date">
            受注日 / 発注日 <span class="required">*</span>
          </label>
          <input type="date" id="field-order-date" class="text-input" required>
        </div>

        <div class="form-row">
          <label class="field-label" for="field-content">
            仕事内容 <span class="required">*</span>
          </label>
          <input type="text" id="field-content" class="text-input"
            placeholder="仕事の内容を入力" required maxlength="200">
        </div>

        <div class="form-row">
          <label class="field-label" for="field-amount">
            金額 <span class="required">*</span>
          </label>
          <div class="input-prefix-wrap">
            <span class="input-prefix">¥</span>
            <input type="number" id="field-amount" class="text-input prefixed"
              placeholder="0" min="0" step="1" required>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="field-client">取引先</label>
          <input type="text" id="field-client" class="text-input"
            placeholder="取引先名（任意）" maxlength="100">
        </div>

        <div class="form-section">作業日程</div>

        <div class="form-row two-col">
          <div>
            <label class="field-label" for="field-start-date">作業開始日</label>
            <input type="date" id="field-start-date" class="text-input">
          </div>
          <div>
            <label class="field-label" for="field-delivery-date">受渡日</label>
            <input type="date" id="field-delivery-date" class="text-input">
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="field-completion-date">完了日</label>
          <input type="date" id="field-completion-date" class="text-input">
        </div>

        <div class="form-section">請求・支払</div>

        <div class="form-row two-col">
          <div>
            <label class="field-label" for="field-invoice-date">請求書発行日</label>
            <input type="date" id="field-invoice-date" class="text-input">
          </div>
          <div>
            <label class="field-label" for="field-transfer-date">振込日</label>
            <input type="date" id="field-transfer-date" class="text-input">
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="field-notes">メモ</label>
          <textarea id="field-notes" class="text-input textarea"
            placeholder="備考・メモ（任意）" rows="3" maxlength="500"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-danger hidden" id="btn-delete">削除</button>
      <div class="footer-right">
        <button class="btn-ghost" id="btn-cancel">キャンセル</button>
        <button class="btn-primary small" id="btn-save">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ======== 削除確認ダイアログ ======== -->
<div id="modal-confirm" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop"></div>
  <div class="confirm-dialog">
    <p class="confirm-msg">このデータを削除しますか？<br>この操作は取り消せません。</p>
    <div class="confirm-btns">
      <button class="btn-ghost" id="btn-confirm-cancel">キャンセル</button>
      <button class="btn-danger" id="btn-confirm-ok">削除する</button>
    </div>
  </div>
</div>

<!-- ======== トースト通知 ======== -->
<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
